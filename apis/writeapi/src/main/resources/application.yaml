server:
  port: 8888

resilience4j:
  circuitbreaker:
    instances:
      tag-upload-file-cb:
        registerHealthIndicator: true
        slidingWindowSize: 30
        minimumNumberOfCalls: 15
        failureRateThreshold: 60
        slowCallDurationThreshold: 3000ms
        slowCallRateThreshold: 60
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 5

      tag-toggle-cb:
        registerHealthIndicator: true
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        slowCallDurationThreshold: 2000ms
        slowCallRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 4

      tagUpdateCB:
        registerHealthIndicator: true
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        slowCallDurationThreshold: 2000ms
        slowCallRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3

      tagToggleCB:
        registerHealthIndicator: true
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        slowCallDurationThreshold: 2000ms
        slowCallRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3

      tagCreateCB:
        registerHealthIndicator: true
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        slowCallDurationThreshold: 2000ms
        slowCallRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3

      tagGetCB:
        registerHealthIndicator: true
        slidingWindowSize: 30
        minimumNumberOfCalls: 15
        failureRateThreshold: 70
        slowCallDurationThreshold: 4000ms
        slowCallRateThreshold: 70
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 10

      tagDeleteCB:
        registerHealthIndicator: true
        slidingWindowSize: 15
        minimumNumberOfCalls: 8
        failureRateThreshold: 45
        slowCallDurationThreshold: 2000ms
        slowCallRateThreshold: 45
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 2

  retry:
    instances:
      super-adm-retry:
        maxAttempts: 7
        waitDuration: 6s
        retryExceptions:
          - org.springframework.dao.DataAccessException

      create-retry:
        maxAttempts: 3
        waitDuration: 4s
        retryExceptions:
          - org.springframework.dao.DataAccessException

      delete-retry:
        maxAttempts: 3
        waitDuration: 4s
        retryExceptions:
          - org.springframework.dao.DataAccessException

      update-retry:
        maxAttempts: 2
        waitDuration: 5s
        retryExceptions:
          - org.springframework.dao.DataAccessException

s3:
  bucketAttachments: attachments

spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  cloud:
    aws:
      s3:
        endpoint: http://localhost:4566
        region: us-east-1
      credentials:
        access-key: test
        secret-key: test
      region:
        static: us-east-1
      path-style: true

  threads:
    virtual:
      enabled: true

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:4000/blog_db?allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
  argon:
    saltLength: 16
    hashLength: 32
    parallelism: 1
    memory: 65536
    iterations: 3
  application:
    name: writeapi
  front:
    url: http://localhost:3000
  security:
    exp:
      token: 24
      refresh: 444444
    jwt:
      secret: 5438y43v734vb7t40yt7y7rft47r7tv43htf3ht40f7t430ft0ft3t4fh94t3r3653667586578784658467867846786667v
snowflake:
  worker-id: 5
  datacenter-id: 1