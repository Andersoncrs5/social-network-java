logging:
  level:
    com.zaxxer.hikari: DEBUG
    com.blog.writeapi.modules.metric.service.provider: INFO

server:
  port: 8889

rate-limit:
  enabled: false

resilience4j:
  circuitbreaker:
    enabled: false
  retry:
    enabled: false

spring:
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: write-api-group-id
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.blog.writeapi.*"

  datasource:
    hikari:
      pool-name: WriteApiTestPool
      minimum-idle: 10
      maximum-pool-size: 30
      connection-timeout: 30000

  sql:
    init:
      mode: always

  application:
    name: writeapi-test

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  threads:
    virtual:
      enabled: true

# Mantemos as configs de Argon2 iguais para garantir que o login funcione nos testes
argon:
  saltLength: 16
  hashLength: 32
  parallelism: 1
  memory: 4096 # Reduzido para os testes rodarem mais rápido (menos CPU)
  iterations: 1

# JWT fixo e curto para facilitar os testes de integração
security:
  exp:
    token: 1
    refresh: 2
  jwt:
    secret: test_secret_key_must_be_long_enough_to_avoid_validation_errors_123456789

snowflake:
  worker-id: 1
  datacenter-id: 1

s3:
  bucketAttachments: attachments